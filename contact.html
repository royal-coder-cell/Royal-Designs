<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Royal Designs</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif;}
body{background:#050505;color:#fff;}

nav{
    width:100%;
    padding:25px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
nav ul{display:flex;gap:35px;list-style:none;}
nav ul li a{
    color:#fff;
    text-decoration:none;
    transition:.3s;
}
nav ul li a:hover{color:#00d4ff;}

.contact-section{
    min-height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:60px 8%;
}

.contact-container{
    max-width:1100px;
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:50px;
}

.contact-info h1{
    font-size:55px;
    margin-bottom:20px;
    line-height:1.1;
}
.contact-info h1 span{color:#00d4ff;}

.contact-info p{
    color:#aaa;
    line-height:1.8;
    margin-bottom:35px;
}

.info-box{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}
.info-box i{
    width:45px;
    height:45px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#00d4ff;
    color:#000;
}

.contact-form{
    background:#111;
    border:1px solid rgba(0,212,255,.25);
    border-radius:20px;
    padding:40px;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    border:1px solid #333;
    background:#080808;
    color:#fff;
    outline:none;
}
.contact-form input:focus,
.contact-form textarea:focus{
    border-color:#00d4ff;
}
.contact-form textarea{
    resize:none;
    height:150px;
}

.button-group{
    display:flex;
    gap:15px;
}

.button-group button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
}

.email-btn{
    background:#00d4ff;
    color:#000;
}

.whatsapp-btn{
    background:#25D366;
    color:#fff;
}

.button-group button:hover{
    transform:translateY(-3px);
}

@media(max-width:800px){
    .contact-container{grid-template-columns:1fr;}
    .contact-info h1{font-size:40px;}
    nav ul{gap:15px;}
    .button-group{flex-direction:column;}
}
</style>
</head>

<body>

<nav>
    <div class="logo">
        <img src="logo1.png" class="logo-img" alt="Royal Designs">
    </div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
    </ul>
</nav>

<section class="contact-section">
<div class="contact-container">

<div class="contact-info">
<h1>LET US CREATE FOR YOU <span>TODAY</span></h1>

<p>Have a project in mind? Whether it's branding, poster design, social media graphics or a complete visual identity, let's bring your ideas to life.</p>

<div class="info-box">
<i class="fa-solid fa-envelope"></i>
<span>emmanuelchiroto10@gmail.com</span>
</div>

<div class="info-box">
<i class="fa-solid fa-phone"></i>
<span>+263 71 979 8271</span>
</div>

<div class="info-box">
<i class="fa-solid fa-location-dot"></i>
<span>Worldwide</span>
</div>
</div>

<div class="contact-form">

<form id="contactForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<input type="text" id="project" placeholder="Project Type" required>

<textarea id="message" placeholder="Tell us about your project" required></textarea>

<div class="button-group">

<button type="button" class="email-btn" onclick="sendEmail()">
<i class="fa-solid fa-envelope"></i> Email
</button>

<button type="button" class="whatsapp-btn" onclick="sendWhatsApp()">
<i class="fa-brands fa-whatsapp"></i> WhatsApp
</button>

</div>

</form>

</div>

</div>
</section>

<script>

function validateForm(){

    const form=document.getElementById("contactForm");

    if(!form.checkValidity()){
        form.reportValidity();
        return false;
    }

    return true;
}

function getData(){

    return{
        name:document.getElementById("name").value.trim(),
        email:document.getElementById("email").value.trim(),
        project:document.getElementById("project").value.trim(),
        message:document.getElementById("message").value.trim()
    };

}

function sendWhatsApp(){

    if(!validateForm()) return;

    const d=getData();

    const text=encodeURIComponent(
`Hello Royal Designs,

Name: ${d.name}
Email: ${d.email}
Project Type: ${d.project}

Project Details:
${d.message}`);

    window.open("https://wa.me/263719798271?text="+text,"_blank");

}

function sendEmail(){

    if(!validateForm()) return;

    const d=getData();

    const subject=encodeURIComponent("New Project Enquiry - "+d.project);

    const body=encodeURIComponent(
`Name: ${d.name}
Email: ${d.email}

Project Type: ${d.project}

Project Details:
${d.message}`);

    window.location.href="mailto:emmanuelchiroto10@gmail.com?subject="+subject+"&body="+body;

}

</script>

</body>
</html>
